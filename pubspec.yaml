name: somni_ai
description: Somni AI - AI-powered sleep tracking app with Gemini insights
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local Database - Drift (SQLite)
  drift: ^2.15.0
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.18

  # Path & Storage
  path_provider: ^2.1.3
  path: ^1.8.3
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.4

  # Sensors & Permissions
  sensors_plus: ^7.0.0
  permission_handler: ^12.0.1

  # Notifications & Alarms
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  flutter_timezone: ^5.0.2
  vibration: ^3.1.8

  # AI / API
  google_generative_ai: ^0.4.7

  # Charts
  fl_chart: ^1.2.0

  # Networking
  http: ^1.2.1

  # UI Utilities
  google_fonts: ^8.1.0
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  intl: ^0.20.2
  connectivity_plus: ^7.1.1
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.15.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.10
  analyzer: ^6.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Light.ttf
          weight: 300
        - asset: assets/fonts/Nunito-Regular.ttf
          weight: 400
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700